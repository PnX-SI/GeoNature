<small>{{ label }}</small>
<input
  class="form-control form-control-sm"
  type="text"
  [placeholder]="placeholder"
  [formControl]="parentFormControl"
/>
<!-- mettre le placeholder dans les fichiers de traductions -->
<div
  *ngIf="
    parentFormControl?.hasError('invalidUuid') &&
    (parentFormControl?.touched || parentFormControl?.dirty)
  "
>
  <small
    class="error"
    style="color: red"
  >
    Le champ doit contenir un UUID valide.
  </small>
</div>
