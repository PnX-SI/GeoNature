<div class="card card-page center-in-div">
  <div class="card-header">
    <h3 class="underlined main-color">{{ 'MyAccount.EmailChangeTitle' | translate }}</h3>
  </div>

  <div class="card-body">
    <div class="alert alert-info mb-4">
      <p>
        {{ 'MyAccount.EmailChangeDescription' | translate }}
      </p>
    </div>

    <div class="form-group row">
      <label class="col-sm-5 col-form-label text-right">
        {{ 'MyAccount.CurrentEmail' | translate }}
      </label>
      <div class="col-sm-7 col-xl-5">
        <input
          type="email"
          class="form-control"
          [value]="currentEmail"
          readonly
          disabled
        />
      </div>
    </div>

    <form [formGroup]="form">
      <div class="form-group row">
        <label
          for="new_mail"
          class="col-sm-5 col-form-label text-right"
        >
          {{ 'MyAccount.NewEmail' | translate }}
        </label>
        <div class="col-sm-7 col-xl-5">
          <input
            type="email"
            class="form-control"
            id="new_mail"
            [placeholder]="'MyAccount.NewEmail' | translate"
            formControlName="new_mail"
          />
          <small
            *ngIf="form.get('new_mail').hasError('required') && form.get('new_mail').touched"
            class="text-danger"
          >
            {{ 'MyAccount.Messages.FieldRequired' | translate }}
          </small>
          <small
            *ngIf="form.get('new_mail').hasError('email') && form.get('new_mail').touched"
            class="text-danger"
          >
            {{ 'MyAccount.Messages.InvalidEmailFormat' | translate }}
          </small>
        </div>
      </div>

      <div class="text-center mt-4">
        <a
          mat-raised-button
          color="warn"
          routerLink="../"
        >
          {{ 'Actions.Cancel' | translate }}
        </a>
        <span
          matTooltip="{{
            !form.valid
              ? ('MyAccount.FormInvalidTooltip' | translate)
              : ('MyAccount.RequestEmailChangeTooltip' | translate)
          }}"
        >
          <button
            mat-raised-button
            class="button-success ml-1"
            (click)="save()"
            [disabled]="!form.valid"
          >
            {{ 'MyAccount.SendRequest' | translate }}
          </button>
        </span>
      </div>
    </form>
  </div>
</div>
