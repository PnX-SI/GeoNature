<div class="container">
  <div class="card mb-3">
    <div class="card-header custom-card-header">
      <h5>{{ 'Import.ObserverMapping.Title' | translate }}</h5>
      <div class="MappingBtn">
        <button
          mat-flat-button
          color="primary"
          (click)="resetMapping()"
          matTooltip=""
        >
          <mat-icon>refresh</mat-icon>
          <span>{{ 'Import.ObserverMapping.Actions.ResetMapping' | translate }}</span>
        </button>
        <button
          mat-flat-button
          color="warn"
          (click)="clearMapping()"
          matTooltip=""
        >
          {{ 'Import.ObserverMapping.Actions.EmptyMapping' | translate }}
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
    <gn-loadable-layout
      [isLoading]="isLoading"
      style="padding: 1em"
    >
      <div class="card-body">
        <table class="table matching-table">
          <thead>
            <tr>
              <th>{{ 'Import.ObserverMapping.Table.InTheFile' | translate }}</th>
              <th>{{ 'Import.ObserverMapping.Table.InDatabase' | translate }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of observerMapping | keyvalue">
              <td>{{ item.key }}</td>
              <td>
                <pnx-observers
                  data-qa="import-observersmapping-observers-form"
                  *ngIf="observerMappingForm.controls[item.key]"
                  [parentFormControl]="observerMappingForm.controls[item.key]"
                  [observers]="observers"
                  [bindAllItem]="true"
                ></pnx-observers>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </gn-loadable-layout>
  </div>
</div>

<div class="d-flex flex-row justify-content-between">
  <button
    class="btn btn-secondary box-shadow d-flex justify-content-center align-content-between"
    (click)="onPreviousStep()"
    mat-raised-button
    color="primary"
    data-qa="import-observersmapping-back-btn"
  >
    <mat-icon>navigate_before</mat-icon>
    {{ 'Previous' | translate }}
  </button>
  <button
    class="btn btn-success box-shadow d-flex justify-content-center align-content-between"
    [disabled]="!isNextStepAvailable()"
    (click)="onNextStep()"
    mat-raised-button
    color="primary"
    data-qa="import-observersmapping-model-validate"
  >
    {{ 'Next' | translate }}
    <mat-icon>navigate_next</mat-icon>
  </button>
</div>
