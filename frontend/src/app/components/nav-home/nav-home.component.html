<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    id="app-sidenav"
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? false : sideNavService.opened"
  >
    <pnx-sidenav-items data-qa="gn-sidenav"></pnx-sidenav-items>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar
      id="app-toolbar"
      class="row"
    >
      <div class="left-toolbar-content">
        <button
          class="mat-elevation-z1 mr-2"
          mat-icon-button
          matTooltip="Ouvrir le menu principal"
          (click)="closeSideBar()"
          data-qa="pnx-home-content-sidebar-open-button"
        >
          <mat-icon aria-label="Ouvrir le menu principal">menu</mat-icon>
        </button>

        <span class="mx-2">
          <a
            data-qa="nav-home-module-name"
            class="home-link"
            [routerLink]="moduleUrl"
          >
            {{ moduleName }}
          </a>
        </span>

        <img
          id="logo-structure"
          class="mx-2"
          src="{{ this.config.API_ENDPOINT }}{{ this.config.STATIC_URL }}/images/logo_structure.png"
          alt=""
        />
      </div>

      <span id="appName">
        <h3>{{ config.appName }}</h3>
      </span>

      <!-- ── VERSION DESKTOP (≥ 600px) ── -->
      <ng-container *ngIf="!isMobile">
        <!-- User Component -->
        <gn-toolbar-user
          [isMobile]="false"
          [currentUser]="currentUser"
          [displayName]="displayName"
          [displayOrganism]="displayOrganism"
          [useLocalProvider]="useLocalProvider"
          [accountManagementEnabled]="config.ACCOUNT_MANAGEMENT.ENABLE_USER_MANAGEMENT"
          [hasObserverSheet]="hasObserverSheet()"
          [observerSheetUrl]="getObserverSheetUrl()"
          [publicAccessUsername]="config.PUBLIC_ACCESS_USERNAME"
        ></gn-toolbar-user>

        <!-- Notifications Badge -->
        <ng-container *ngIf="config.NOTIFICATIONS_ENABLED == true">
          <a
            class="mx-2 mat-elevation-z1"
            mat-icon-button
            matTooltip="Accéder aux notifications"
            matBadge="{{ notificationNumber }}"
            matBadgeHidden="{{ notificationNumber == 0 }}"
            (click)="openNotification()"
          >
            <mat-icon>notifications</mat-icon>
          </a>
        </ng-container>

        <!-- Language Component -->
        <gn-toolbar-language
          [isMobile]="false"
          [currentLocale]="locale"
          [multilingualEnabled]="config.FRONTEND.MULTILINGUAL"
          (languageChange)="changeLanguage($event)"
        ></gn-toolbar-language>

        <!-- Actions Component (Documentation & Logout) -->
        <gn-toolbar-actions
          [isMobile]="false"
          [documentationUrl]="currentDocUrl"
          [isPublicAccess]="config.PUBLIC_ACCESS_USERNAME == currentUser?.user_login"
          (logoutClick)="authService.logout()"
        ></gn-toolbar-actions>
      </ng-container>

      <!-- ── VERSION MOBILE (< 600px) ── -->
      <ng-container *ngIf="isMobile">
        <!-- Badge notifications visible en dehors du menu -->
        <ng-container
          *ngIf="
            config.NOTIFICATIONS_ENABLED == true &&
            config.PUBLIC_ACCESS_USERNAME != currentUser?.user_login
          "
        >
          <a
            class="mx-1 mat-elevation-z1"
            mat-icon-button
            matTooltip="Accéder aux notifications"
            matBadge="{{ notificationNumber }}"
            matBadgeHidden="{{ notificationNumber == 0 }}"
            (click)="openNotification()"
          >
            <mat-icon>notifications</mat-icon>
          </a>
        </ng-container>

        <!-- Bouton menu mobile -->
        <button
          class="mx-1 mat-elevation-z1"
          mat-icon-button
          matTooltip="Plus d'options"
          [matMenuTriggerFor]="mobileMenu"
          data-qa="pnx-home-content-mobile-menu-button"
        >
          <mat-icon>more_vert</mat-icon>
        </button>

        <mat-menu #mobileMenu>
          <!-- User Component (Mobile) -->
          <gn-toolbar-user
            [isMobile]="true"
            [currentUser]="currentUser"
            [displayName]="displayName"
            [displayOrganism]="displayOrganism"
            [useLocalProvider]="useLocalProvider"
            [accountManagementEnabled]="config.ACCOUNT_MANAGEMENT.ENABLE_USER_MANAGEMENT"
            [hasObserverSheet]="hasObserverSheet()"
            [observerSheetUrl]="getObserverSheetUrl()"
            [publicAccessUsername]="config.PUBLIC_ACCESS_USERNAME"
          ></gn-toolbar-user>

          <!-- Language Component (Mobile) -->
          <gn-toolbar-language
            [isMobile]="true"
            [currentLocale]="locale"
            [multilingualEnabled]="config.FRONTEND.MULTILINGUAL"
            (languageChange)="changeLanguage($event)"
          ></gn-toolbar-language>

          <!-- Actions Component (Mobile) -->
          <gn-toolbar-actions
            [isMobile]="true"
            [documentationUrl]="currentDocUrl"
            [isPublicAccess]="config.PUBLIC_ACCESS_USERNAME == currentUser?.user_login"
            (logoutClick)="authService.logout()"
          ></gn-toolbar-actions>
        </mat-menu>
      </ng-container>
    </mat-toolbar>

    <div class="app-content">
      <div>
        <router-outlet></router-outlet>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
