<!-- DESKTOP VERSION -->
<ng-container *ngIf="!isMobile">
  <!-- Notifications -->
  <ng-container *ngIf="notificationsEnabled">
    <a
      class="mx-2 mat-elevation-z1"
      mat-icon-button
      matTooltip="Accéder aux notifications"
      matBadge="{{ notificationNumber }}"
      matBadgeHidden="{{ notificationNumber === 0 }}"
      (click)="openNotifications()"
    >
      <mat-icon>notifications</mat-icon>
    </a>
  </ng-container>

  <!-- Documentation -->
  <a
    class="mx-2 mat-elevation-z1"
    mat-icon-button
    matTooltip="Ouvrir la documentation"
    [href]="documentationUrl"
    target="_blank"
  >
    <mat-icon id="documentation_link">library_books</mat-icon>
  </a>

  <!-- Logout -->
  <button
    class="mx-2 mat-elevation-z1"
    mat-icon-button
    matTooltip="{{ 'Authentication.Actions.LogOut' | translate }}"
    (click)="logout()"
    data-qa="pnx-home-content-exit-button"
  >
    <mat-icon>exit_to_app</mat-icon>
  </button>
</ng-container>

<!-- MOBILE VERSION -->
<ng-container *ngIf="isMobile">
  <!-- Documentation -->
  <a
    mat-menu-item
    [href]="documentationUrl"
    target="_blank"
  >
    <mat-icon>library_books</mat-icon>
    <span>Documentation</span>
  </a>

  <!-- Logout -->
  <button
    mat-menu-item
    (click)="logout()"
    data-qa="pnx-home-content-exit-button"
  >
    <mat-icon>exit_to_app</mat-icon>
    {{ 'Authentication.Actions.LogOut' | translate }}
  </button>
</ng-container>
