name: Tests frontend
on:
  push:
    branches:
      - master
      - hotfixes
      - develop
  pull_request:
    branches:
      - master
      - hotfixes
      - develop

jobs:
  mount_app_and_run_cypress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    services:
      postgres:
        image: ghcr.io/pnx-si/geonature-db:latest
        env:
          POSTGRES_DB: geonature2db
          POSTGRES_PASSWORD: geonatadmin
          POSTGRES_USER: geonatadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install GDAL
        run: |
          sudo apt update
          sudo apt install -y libgdal-dev

      - name: Sync project dependencies
        run: |
          uv sync --locked --extra dev${{ github.base_ref != 'master' && ' --no-install-workspace' || '' }}
        # FRONTEND
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Node ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: generate frontend config
        run: |
          cp ./config/settings.ini.sample ./config/settings.ini
          ./install/05_install_frontend.sh --ci
        env:
          GEONATURE_CONFIG_FILE: "${{ github.workspace }}/config/test_config.toml"
      - name: Install core modules
        run: |
          uv pip install -e contrib/occtax
          uv pip install -e contrib/gn_module_occhab
          uv pip install -e contrib/gn_module_validation
      - name: Setup core modules
        run: |
          uv run geonature install-gn-module contrib/occtax OCCTAX --build=false --upgrade-db=false
          uv run geonature install-gn-module contrib/gn_module_occhab OCCHAB --build=false --upgrade-db=false
          uv run geonature install-gn-module contrib/gn_module_validation VALIDATION --build=false --upgrade-db=false
          uv run geonature db upgrade cypress-samples-test@head
          uv run geonature db autoupgrade
          uv run geonature permissions supergrant --group --nom "Grp_admin" --yes
          uv run geonature db autoupgrade
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml
      - name: Run GeoNature backend
        run: uv run geonature dev_back &
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml
      - name: Run celery
        run: uv run celery -A geonature.celery_app:app worker &
        working-directory: ./backend/geonature/
        env:
          GEONATURE_CONFIG_FILE: "${{ github.workspace }}/config/test_config.toml"
      - name: Cypress run
        uses: cypress-io/github-action@v5
        with:
          record: false
          working-directory: ./frontend
          start: npm run start
          wait-on: http://127.0.0.1:4200
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 1
