name: pytest

on:
  push:
    paths:
      - "backend/**"
      - "contrib/**/backend/**"
    branches:
      - master
      - hotfixes
      - develop
  pull_request:
    paths:
      - "backend/**"
      - "contrib/**/backend/**"
    branches:
      - master
      - hotfixes
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        debian-version: [ "12", "13" ]
        include:
          - debian-version: "12"
            python-version: "3.11"
            postgres-version: "15"
            postgis-version: "3.3"
          - debian-version: "13"
            python-version: "3.13"
            postgres-version: "17"
            postgis-version: "3.5"

    name: Debian ${{ matrix.debian-version }}

    services:
      postgres:
        image: ghcr.io/pnx-si/geonature-db:latest
        env:
          POSTGRES_DB: geonature2db
          POSTGRES_PASSWORD: geonatadmin
          POSTGRES_USER: geonatadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout
          5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install GDAL
        run: |
          sudo apt update
          sudo apt install -y libgdal-dev

      - name: Sync project dependencies
        run: |
          uv sync --locked --extra dev{{ github.base_ref != 'master' && ' --no-install-workspace' || '' }}

      - name: Install core modules backend
        # Not part of the uv workspace, install as editable into the synced venv
        run: |
          uv pip install -e contrib/occtax
          uv pip install -e contrib/gn_module_occhab
          uv pip install -e contrib/gn_module_validation

      - name: Install core modules database
        run: |
          uv run geonature db autoupgrade
          uv run geonature upgrade-modules-db
          uv run geonature db downgrade ref_geo_inpn_grids_50@base
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml

      - name: Show database status
        run: |
          uv run geonature db status --dependencies
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml

      - name: Test with pytest
        run: |
          uv run pytest -v --cov --cov-report xml
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml

      - name: Upload coverage to Codecov
        if: ${{ matrix.debian-version == '12' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: pytest
