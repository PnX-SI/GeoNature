name: Run pytest against GeoNature module

on:
  workflow_call:
    inputs:
      geonature_repo:
        description: "Le dépot de GeoNature à utiliser"
        default: "pnx-si/geonature"
        required: false
        type: string
      geonature_ref:
        description: "La branche, tag ou SHA de GeoNature à utiliser"
        default: "master"
        required: false
        type: string
      upload_coverage:
        description: "Téléverser la couverture de code sur Codecov"
        default: false
        required: false
        type: boolean
    secrets:
      codecov_token:
        description: "Token pour téléverser sur codecov"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        debian-version: ["12", "13"]
        include:
          - debian-version: "12"
            python-version: "3.11"
            postgres-version: "15"
            postgis-version: "3.3"
          - debian-version: "13"
            python-version: "3.13"
            postgres-version: "17"
            postgis-version: "3.6"

    name: Debian ${{ matrix.debian-version }}

    services:
      postgres:
        image: ghcr.io/pnx-si/geonature-db:2.15.4
        env:
          POSTGRES_DB: geonature2db
          POSTGRES_PASSWORD: geonatadmin
          POSTGRES_USER: geonatadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MODULE_DIR: ${{ github.workspace }}/extra/${{ github.event.repository.name }}

    steps:
      - name: Clone GeoNature
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.geonature_repo }}
          ref: ${{ inputs.geonature_ref }}
          submodules: true
      - name: Clone ${{ github.event.repository.name }} module
        uses: actions/checkout@v6
        with:
          path: ${{ env.MODULE_DIR }}
      - name: Add database extensions
        run: |
          psql -h localhost -U geonatadmin -d geonature2db -f install/assets/db/add_pg_extensions.sql
        env:
          PGPASSWORD: "geonatadmin"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Install GDAL
        run: |
          sudo apt update
          sudo apt install -y libgdal-dev
      - name: Sync project dependencies
        run: |
          uv sync --locked --extra dev${{ inputs.geonature_ref != 'master' && ' --no-install-workspace' || '' }}

      - name: Install core modules backend
        run: |
          uv pip install -e contrib/occtax
          uv pip install -e contrib/gn_module_occhab
          uv pip install -e contrib/gn_module_validation
      - name: Install ${{ github.event.repository.name }} module backend
        run: |
          uv pip install -e .
        working-directory: ${{ env.MODULE_DIR }}
      - name: Show database status
        run: |
          uv run geonature db status
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml
      - name: Install modules database
        run: |
          uv run geonature db autoupgrade
          uv run geonature upgrade-modules-db
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml
      - name: Show database status
        run: |
          uv run geonature db status --dependencies
        env:
          GEONATURE_CONFIG_FILE: config/test_config.toml
      - name: Test with pytest
        run: |
          uv run pytest -v --cov=${{ env.MODULE_DIR }} --cov-report xml
        working-directory: ${{ env.MODULE_DIR }}
        env:
          GEONATURE_CONFIG_FILE: ${{ github.workspace }}/config/test_config.toml
      - name: Show coverage
        run: |
          uv run coverage report
        working-directory: ${{ env.MODULE_DIR }}
      - name: Upload coverage to Codecov
        if: ${{ inputs.upload_coverage && matrix.debian-version == '12' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov_token }}
          files: ${{ env.MODULE_DIR }}/coverage.xml
          flags: pytest
          root_dir: ${{ env.MODULE_DIR }}
