<table
  mat-table
  [dataSource]="rows.controls"
  class="mat-elevation-z2 compact-table"
  #strateTable
>
  <ng-container matColumnDef="nom_valide">
    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Nom valide
    </th>
    <td
      mat-cell
      *matCellDef="let row; let i = index"
    ></td>
  </ng-container>

  <ng-container matColumnDef="nom_cite">
    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Nom cité
    </th>
    <td
      mat-cell
      *matCellDef="let row; let i = index"
    ></td>
  </ng-container>
  <ng-container
    *ngFor="let col of strateColumns"
    [matColumnDef]="col"
  >
    <th
      mat-header-cell
      *matHeaderCellDef
    >
      {{ col }}
    </th>
    <td
      mat-cell
      *matCellDef="let row; let i = index"
    ></td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Actions
    </th>
    <td
      mat-cell
      *matCellDef="let row; let i = index"
    ></td>
  </ng-container>

  <tr
    mat-header-row
    *matHeaderRowDef="displayedColumns"
  ></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    [formGroup]="row"
  ></tr>
</table>
